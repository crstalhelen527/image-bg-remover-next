name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # 设置Node.js 24以兼容GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        # 使用--legacy-peer-deps解决依赖冲突
        npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      
    - name: Build project
      run: npm run build
      env:
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        NODE_ENV: production
        
    - name: Prepare for Cloudflare Pages
      run: |
        # 创建Cloudflare Pages需要的配置
        echo "构建完成，准备部署到Cloudflare Pages"
        ls -la .next/
        
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: da9508a0610236e7085687e13c88bf59
        projectName: image-bg-remover-next
        directory: .next
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        # 使用Node.js运行时
        compatibilityDate: '2026-04-03'
        compatibilityFlags: 'nodejs_compat'