name: Deploy with Stable npm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js with specific npm
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json
        
    - name: Install stable npm version
      run: |
        # 使用稳定的npm版本
        npm install -g npm@10.5.0
        
    - name: Clean npm cache
      run: |
        npm cache clean --force
        rm -rf node_modules
        
    - name: Install dependencies
      run: |
        # 使用--legacy-peer-deps和--no-audit
        npm ci --legacy-peer-deps --no-audit --no-fund
        
    - name: Build project
      run: npm run build
      env:
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        NODE_ENV: production
        
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: da9508a0610236e7085687e13c88bf59
        projectName: image-bg-remover-next
        directory: .next
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}