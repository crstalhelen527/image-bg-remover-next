name: Deploy with Simple Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies (简化版)
      run: |
        # 只安装核心依赖，跳过可选依赖
        npm install --no-optional --legacy-peer-deps
        
    - name: Build project
      run: npm run build
      env:
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        NODE_ENV: production
        
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: da9508a0610236e7085687e13c88bf59
        projectName: image-bg-remover-next
        directory: .next
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}